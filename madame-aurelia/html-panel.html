<style>
  /* === Carnival Mystic — Madame Aurelia's Fortune Booth === */
  :root {
    --night:    #0e0a16;       /* deep velvet shadow */
    --plum:     #1a0e22;       /* booth interior */
    --burgundy: #5a1024;       /* curtain */
    --burgundy-deep: #2b0810;
    --gold:     #d4a548;       /* gilt brass */
    --gold-hi:  #f3d77a;       /* candlelight on gold */
    --gold-dim: #8c6a2a;       /* shadowed gilt */
    --ivory:    #f4e4c1;       /* old parchment */
    --ember:    #ff8a3c;       /* candle flame */
    --orb:      #b66cff;       /* crystal glow */
  }
  html, body { background: var(--night); }
  body {
    margin: 0; min-height: 100vh; color: var(--ivory);
    font-family: 'IM Fell English', Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    background:
      radial-gradient(ellipse at top, rgba(214,165,72,0.10), transparent 55%),
      radial-gradient(ellipse at bottom, rgba(90,16,36,0.45), transparent 65%),
      var(--night);
    background-attachment: fixed;
  }

  /* booth: outer wooden cabinet */
  #booth {
    width: min(475px, 100vw); margin: 0; box-sizing: border-box;
    padding: 10px 10px 0px;
    background:
      linear-gradient(180deg, #2a1612 0%, #1a0d0a 60%, #0c0605 100%);
    border: 3px solid #1a0a05;
    box-shadow:
      inset 0 0 0 2px var(--gold-dim),
      inset 0 0 0 4px #1a0a05,
      inset 0 0 0 5px var(--gold),
      0 24px 60px rgba(0,0,0,0.6),
      0 0 80px rgba(214,165,72,0.06);
    position: relative;
  }
  /* pediment SVG sits on top of cabinet */
  #pediment { display: block; width: 100%; height: auto; margin-bottom: 6px; }
  #pediment .gilt { fill: var(--gold); }
  #pediment .gilt-hi { fill: var(--gold-hi); }
  #pediment .dim { fill: var(--gold-dim); }
  #pediment .name { font-family:'Merienda',serif; font-weight:700; fill: var(--gold-hi);
                    letter-spacing: 3px; }
  #pediment .sub  { font-family:'IM Fell English',serif; font-style:italic;
                    fill: var(--gold); letter-spacing: 1px; }

  /* the curtained window where Madame appears */
  #window {
    position: relative; padding: 15px;
    background:
      radial-gradient(ellipse at center 40%, #2a0b18 0%, #160510 60%, #0a0306 100%);
    border: 2px solid var(--burgundy-deep);
    box-shadow:
      inset 0 0 0 2px var(--gold-dim),
      inset 0 0 30px rgba(0,0,0,0.7),
      inset 0 0 80px rgba(255,138,60,0.06);
  }
  /* velvet curtains — pure CSS pleating using stripes */
  #window::before, #window::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 41px;
    background:
      repeating-linear-gradient(90deg,
        #2b0810 0px, #4a0e1f 6px, #6b1530 12px, #4a0e1f 18px, #2b0810 24px);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  #window::before { left: 0; }
  #window::after  { right: 0; }

  /* the counter display — a brass-rimmed window with the fate number */
  #counterWrap {
    position: relative; margin: 0 44px; padding: 10px 14px;
    background:
      radial-gradient(ellipse at center, #1f0d10 0%, #0a0306 100%);
    border: 2px solid var(--gold-dim);
    box-shadow:
      inset 0 0 0 1px #000,
      inset 0 0 20px rgba(255,138,60,0.10),
      0 0 0 1px var(--gold) inset;
  }
  #counterLabel {
    font-family: 'Merienda', serif; font-weight: 500; font-size: 20px;
    letter-spacing: 4px; text-align: center; color: var(--gold);
    margin-bottom: 4px;
  }
  #counter {
    font-family: 'Merienda', serif; font-weight: 700; font-size: 40px;
    text-align: center; color: var(--ember); white-space: nowrap;
    overflow: hidden; line-height: 1.1;
    text-shadow:
      0 0 8px rgba(255,138,60,0.55),
      0 0 24px rgba(255,138,60,0.25),
      0 1px 0 #000;
  }

  /* the coin slot — the call to action */
  #coinSlot {
    margin: 18px 44px 6px; padding: 14px 16px; text-align: center;
    background:
      linear-gradient(180deg, #1a0a05 0%, #0a0403 100%);
    border: 2px solid var(--gold-dim);
    box-shadow:
      inset 0 0 0 1px var(--gold),
      inset 0 6px 12px rgba(0,0,0,0.7),
      inset 0 -2px 0 rgba(214,165,72,0.18);
    cursor: pointer; user-select: none;
    transition: filter 200ms;
  }
  #coinSlot:hover { filter: brightness(1.18); }
  #coinSlot.busy { cursor: progress; filter: brightness(0.7); }
  #coinSlotLabel {
    font-family: 'Merienda', serif; font-weight: 700; font-size: 14px;
    letter-spacing: 3px; color: var(--gold-hi);
  }
  #coinSlotHint {
    font-family: 'IM Fell English', serif; font-style: italic; font-size: 14px;
    color: var(--ivory); opacity: 0.78; margin-top: 4px;
  }
  /* the slot mouth — a thin dark slit */
  #slotMouth {
    height: 6px; margin: 8px auto 0; width: 80px;
    background: #000;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.9),
      0 1px 0 var(--gold-dim);
  }

  /* the fortune card — appears when a number is drawn */
  #card {
    margin: 14px 32px 6px; padding: 16px;
    background:
      linear-gradient(180deg, #f4e4c1 0%, #ddc89a 100%);
    color: #2b1b0a; display: none; position: relative;
    border: 1px solid #6b4a1a;
    box-shadow:
      inset 0 0 0 4px #f4e4c1,
      inset 0 0 0 5px var(--gold-dim),
      0 8px 24px rgba(0,0,0,0.5);
  }
  #cardInner {
    border: 1px solid var(--gold-dim);
    padding: 12px;
    background:
      repeating-linear-gradient(45deg,
        transparent 0 6px, rgba(214,165,72,0.04) 6px 7px);
  }
  #cardNum {
    font-family: 'Merienda', serif; font-weight: 700; font-size: 26px;
    letter-spacing: 2px; color: var(--burgundy);
    text-align: center; margin-bottom: 6px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }
  #cardDivider {
    text-align: center; color: var(--gold-dim);
    font-size: 14px; line-height: 1; margin: 4px 0 8px;
    letter-spacing: 8px;
  }
  #fortune {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 16px; line-height: 1.55; min-height: 1.6em;
    color: #2b1b0a; text-align: center; padding: 0 4px;
  }
  /* the tarot image area */
  #sealWrap {
    margin: 12px auto 4px; width: 200px; height: 280px;
    background: var(--plum); border: 2px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 0 1px var(--gold), inset 0 0 30px rgba(0,0,0,0.6);
  }
  #seal { width: 100%; height: 100%; object-fit: cover; display: none; }
  #seal.ready { display: block; }
  #sealFallback {
    font-family: 'Merienda', serif; font-weight: 700; font-size: 38px;
    color: var(--gold-hi); text-align: center;
    text-shadow: 0 0 12px rgba(214,165,72,0.5);
    display: none;
  }

  /* crystal-ball spinner — the image-gen loading state */
  #spinner { display: none; flex-direction: column; align-items: center; gap: 10px; }
  #spinner.active { display: flex; }
  .orb {
    width: 76px; height: 76px; border-radius: 50%; position: relative;
    background:
      radial-gradient(circle at 35% 30%,
        rgba(255,255,255,0.85) 0%,
        rgba(182,108,255,0.65) 18%,
        rgba(120,40,200,0.55) 45%,
        rgba(30,8,60,0.95) 80%);
    box-shadow:
      0 0 16px rgba(182,108,255,0.55),
      0 0 32px rgba(182,108,255,0.30),
      inset -8px -10px 18px rgba(0,0,0,0.5),
      inset 8px 10px 14px rgba(255,255,255,0.10);
    animation: orb-pulse 2.4s ease-in-out infinite;
  }
  .orb::after {
    content: ""; position: absolute; inset: -10px; border-radius: 50%;
    border: 1px dashed rgba(214,165,72,0.35);
    animation: orb-rot 12s linear infinite;
  }
  @keyframes orb-pulse {
    0%,100% { box-shadow: 0 0 16px rgba(182,108,255,0.55), 0 0 32px rgba(182,108,255,0.30), inset -8px -10px 18px rgba(0,0,0,0.5), inset 8px 10px 14px rgba(255,255,255,0.10); }
    50%     { box-shadow: 0 0 28px rgba(182,108,255,0.85), 0 0 56px rgba(182,108,255,0.45), inset -8px -10px 18px rgba(0,0,0,0.5), inset 8px 10px 14px rgba(255,255,255,0.18); }
  }
  @keyframes orb-rot { to { transform: rotate(360deg); } }
  .spinnerLabel {
    font-family: 'IM Fell English', serif; font-style: italic;
    color: var(--ivory); opacity: 0.78; font-size: 13px; letter-spacing: 1px;
  }

  /* hidden / dev */
  #hint {
    font-family: 'IM Fell English', serif; font-style: italic;
    text-align: center; color: var(--ivory); opacity: 0.7;
    font-size: 13px; margin: 14px 8px 4px; padding: 0 8px;
  }
  #reset {
    margin: 10px auto 0; padding: 6px 12px; display: none;
    font-family: 'Merienda', serif; font-size: 11px; letter-spacing: 2px;
    background: var(--burgundy-deep); color: var(--ivory);
    border: 1px solid var(--gold-dim); cursor: pointer;
  }
  #debug {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: rgba(214,165,72,0.7); text-align: center;
    margin-top: 8px; word-break: break-all; display: none;
  }

  /* footer */
  .footer {
    font-family: 'IM Fell English', serif; font-style: italic;
    color: rgba(244,228,193,0.45); font-size: 11px; text-align: center;
    margin: 8px 8px 28px; letter-spacing: 1px;
  }
  .footer a { color: var(--gold); text-decoration: none; }
  .footer a:hover { color: var(--gold-hi); }
</style>

<script>
(async function () {
  // --- inlined from src/number-facts.js (tested separately) ---
  function isPrime(n) {
    if (n < 2) return false;
    for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
    return true;
  }

  function isSequential(digits, step) {
    if (digits.length < 2) return false;
    for (let i = 1; i < digits.length; i++) {
      if (digits[i] - digits[i - 1] !== step) return false;
    }
    return true;
  }

  function numberFacts(n, ctx = {}) {
    const digits = String(n).split("").map(Number);
    const uniq = new Set(digits);
    return {
      n,
      digitSum: digits.reduce((a, b) => a + b, 0),
      digitCount: digits.length,
      isPrime: isPrime(n),
      isPalindrome: String(n) === String(n).split("").reverse().join(""),
      hasRepeatedDigits: uniq.size < digits.length,
      allSameDigit: uniq.size === 1,
      isSequentialUp: isSequential(digits, 1),
      isSequentialDown: isSequential(digits, -1),
      isRoundHundred: n % 100 === 0,
      isRoundThousand: n % 1000 === 0,
      isFirstToday: !!ctx.isFirstToday,
      priorCount: ctx.priorCount != null ? ctx.priorCount : n - 1,
    };
  }

  // Returns 1-2 human-readable fact strings, most "interesting" first.
  // Always returns at least one (the ordinal fallback) so the fortune
  // prompt is never starved of raw material.
  function pickSalientFacts(f) {
    const ranked = [];
    if (f.allSameDigit) ranked.push(`every digit is the same — a tidy ${f.n}`);
    if (f.isPalindrome) ranked.push(`it reads the same forwards and backwards`);
    if (f.isSequentialUp) ranked.push(`its digits march upward in a neat row`);
    if (f.isSequentialDown) ranked.push(`its digits step downward like a staircase`);
    if (f.isRoundThousand) ranked.push(`a clean, round thousand`);
    else if (f.isRoundHundred) ranked.push(`a round, even hundred`);
    if (f.isPrime) ranked.push(`it is prime — indivisible, stubborn, whole`);
    if (f.isFirstToday) ranked.push(`it is the first number drawn today`);
    if (f.hasRepeatedDigits && ranked.length === 0)
      ranked.push(`some of its digits keep repeating`);
    // Fallback — always available:
    ranked.push(`its digits add up to ${f.digitSum}`);
    ranked.push(`${f.priorCount} people drew a number before this one`);
    return ranked.slice(0, 2);
  }

  const $ = (id) => document.getElementById(id);
  const MAX_TICKET = 999999999999;

  async function ensureDexie() {
    for (let i = 0; i < 30 && typeof Dexie === "undefined"; i++) {
      await new Promise((r) => setTimeout(r, 100));
    }
    if (typeof Dexie === "undefined") {
      await new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/dexie@4.0.11/dist/dexie.min.js";
        s.onload = resolve;
        s.onerror = resolve;
        document.head.appendChild(s);
      });
    }
  }

  await ensureDexie();
  if (typeof Dexie === "undefined") {
    $("hint").textContent = "error loading Dexie db — please refresh";
    return;
  }
  const db = new Dexie("the-dispenser-v1");
  db.version(1).stores({ stubs: "number", misc: "key" });

  let state = "LOADING";
  let epoch = 0;
  let currentNumber = 0;
  let lastCounter = null;
  let lastWrite = "—";
  let drawId = 0; // monotonic — guards async results against being overwritten by a later draw

  const setHint = (t) => { $("hint").textContent = t; };
  const fmt = (n) => Math.min(n, MAX_TICKET).toLocaleString();
  const fmtCard = (n) => "№ " + fmt(n);

  // Auto-fit the counter font — stretch small numbers, shrink huge ones.
  function fitText(text) {
    const el = $("counter");
    el.textContent = text;
    const probe = document.createElement("span");
    probe.style.cssText = "position:absolute;left:-9999px;top:0;white-space:nowrap;"
      + "font-family:'Merienda',serif;font-weight:700;font-size:100px;";
    probe.textContent = text;
    document.body.appendChild(probe);
    const w = probe.offsetWidth || 1;
    probe.remove();
    const avail = (el.clientWidth || 240) - 6;
    let size = 100 * (avail / w);
    size = Math.max(15, Math.min(size, 88));
    el.style.fontSize = size + "px";
  }

  function countUp(from, to, ms) {
    const el = $("counter");
    fitText(fmt(to));
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / ms);
      el.textContent = fmt(Math.round(from + (to - from) * t));
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  window.addEventListener("resize", () => fitText(fmt(currentNumber)));

  async function getEpoch() {
    const row = await db.misc.get("epoch");
    return row ? row.value : 1;
  }
  async function getLocalMax() {
    const row = await db.misc.get("localMax");
    return row ? row.value : 0;
  }
  async function setLocalMax(v) {
    const cur = await getLocalMax();
    if (v > cur) await db.misc.put({ key: "localMax", value: v });
    return Math.max(v, cur);
  }
  const counterKey = () => "tickets-e" + epoch;

  async function updateDebug() {
    const lm = await getLocalMax();
    const c = lastCounter ? (lastCounter.ok ? lastCounter.value : "unreachable") : "?";
    $("debug").textContent =
      `e${epoch} · counter:${c} · local:${lm} · shown:${currentNumber.toLocaleString()} · tick:${lastWrite}`;
  }

  // Reset the slot + card to a state where another draw can happen.
  function armSlot() {
    $("coinSlot").classList.remove("busy");
    $("coinSlotLabel").textContent = "INSERT A COIN";
    $("coinSlotHint").textContent = "Madame Aurelia awaits";
  }
  function setSlotBusy(msg) {
    $("coinSlot").classList.add("busy");
    $("coinSlotLabel").textContent = msg;
    $("coinSlotHint").textContent = "";
  }

  // --- LOADING -> READY (or OFFLINE) ---
  async function boot() {
    epoch = await getEpoch();
    if (window.innerWidth < 500) setTimeout(() => root.aiTextPlugin({ preload: true }), 5000);
    else root.aiTextPlugin({ preload: true });

    const counter = await root.readCounter(counterKey());
    lastCounter = counter;
    const localMax = await getLocalMax();
    currentNumber = counter.ok ? Math.max(counter.value, localMax) : localMax;
    if (counter.ok && currentNumber > localMax) await setLocalMax(currentNumber);

    countUp(0, currentNumber, 700);
    await updateDebug();

    if (!counter.ok) {
      state = "OFFLINE";
      setHint("The remote counter service is unreachable. App fallback to offline mode.");
    } else {
      state = "READY";
      setHint(currentNumber === 0
        ? "The booth has just opened. Be the first to have your fortune read."
        : "Madame Aurelia awaits");
    }
  }

  // --- TEAR / READING SEQUENCE ---
  async function draw() {
    if (state !== "READY" && state !== "OFFLINE") return; // guard
    state = "DRAWING";
    const myDraw = ++drawId; // every later result must check this is still current
    setSlotBusy("generating...");
    // Hide any previous card cleanly before the new one arrives.
    $("card").style.display = "none";
    $("seal").classList.remove("ready");
    $("seal").src = "";
    $("sealFallback").style.display = "none";
    $("fortune").textContent = "";

    const localMax = await getLocalMax();
    const tick = await root.tickCounter(counterKey());
    let n, recorded;
    if (tick.ok) {
      n = Math.max(tick.value, localMax + 1);
      recorded = true;
      lastWrite = "ticked->shared";
    } else {
      n = Math.max(currentNumber, localMax) + 1;
      recorded = false;
      lastWrite = "tick failed";
    }
    n = Math.min(n, MAX_TICKET);

    state = "REVEALING";
    $("card").style.display = "block";
    $("cardNum").textContent = fmtCard(n);
    $("spinner").classList.add("active");           // crystal orb spins
    $("sealFallback").textContent = fmtCard(n);

    // Fortune (streamed)
    $("fortune").textContent = "";
    const facts = pickSalientFacts(numberFacts(n, { priorCount: n - 1 }));
    const fortuneRes = await root.getFortune(n, facts, (chunk) => {
      $("fortune").textContent += chunk;
    });
    $("fortune").textContent = fortuneRes.text;

    // Tarot card image — the spinner waits for this (or its failure).
    // Guard: a slow seal from an EARLIER draw must not overwrite the CURRENT
    // card. Each .then closes over `myDraw` and bails if a newer draw started.
    root.generateSeal(n).then((url) => {
      if (myDraw !== drawId) return; // stale — drop on the floor
      $("spinner").classList.remove("active");
      if (url) {
        $("seal").src = url;
        $("seal").classList.add("ready");
      } else {
        $("sealFallback").style.display = "block";
      }
    });

    const stub = { number: n, fortune: fortuneRes.text, sealUrl: "", recorded };
    await db.stubs.put(stub);
    await setLocalMax(n);

    const prev = currentNumber;
    currentNumber = n;
    countUp(prev, n, 500);
    await updateDebug();

    state = "READY"; // re-arm immediately so user can draw again
    armSlot();
    setHint(recorded
      ? "Your number was " + fmtCard(n) + " , keep it close."
      : "General error: Remote service unreachable. App fall back to offline mode.");
  }

  // --- RESET (testing) ---
  $("reset").onclick = async () => {
    const ok = await root.confirmAsync(
      "Clears your local history.\n\n Remote counter is hard-coded and cannot be reset.\n\n Continue?"
    );
    if (!ok) return;
    const e = await getEpoch();
    await db.stubs.clear();
    await db.misc.clear();
    await db.misc.put({ key: "epoch", value: e + 1 });
    location.reload();
  };

  // coin slot is the only action — clickable + keyboard-activatable
  $("coinSlot").onclick = draw;
  $("coinSlot").onkeydown = (e) => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); draw(); }
  };

  await boot();
  if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
})();
</script>
